<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inventario</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #223;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    form {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: flex;
      flex-direction: column;
      font-weight: bold;
      gap: 6px;
    }

    input, select, textarea, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #cfd8e3;
      font-size: 14px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      padding: 10px;
    }

    th {
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agregar artículos al inventario</h1>
    <p>Completa este formulario para registrar un producto nuevo.</p>

    <form id="inventoryForm">
      <div class="grid">
        <label>
          Nombre del artículo
          <input type="text" id="nombre" required />
        </label>
        <label>
          Categoría
          <select id="categoria">
            <option value="Tecnología">Tecnología</option>
            <option value="Hogar">Hogar</option>
            <option value="Oficina">Oficina</option>
            <option value="Ropa">Ropa</option>
          </select>
        </label>
        <label>
          Cantidad
          <input type="number" id="cantidad" min="1" value="1" required />
        </label>
        <label>
          Precio unitario
          <input type="number" id="precio" min="0" step="0.01" required />
        </label>
      </div>

      <label>
        Descripción
        <textarea id="descripcion" rows="3"></textarea>
      </label>

      <button type="submit">Agregar artículo</button>
    </form>

    <div>
      <h2>Artículos registrados</h2>
      <table id="inventoryTable">
        <thead>
          <tr>
            <th>Artículo</th>
            <th>Categoría</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>Descripción</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const form = document.getElementById('inventoryForm');
    const tableBody = document.querySelector('#inventoryTable tbody');
    const storageKey = 'inventoryItems';

    function loadItems() {
      const items = localStorage.getItem(storageKey);
      return items ? JSON.parse(items) : [];
    }

    function saveItems(items) {
      localStorage.setItem(storageKey, JSON.stringify(items));
    }

    function renderItems(items) {
      tableBody.innerHTML = '';

      if (items.length === 0) {
        const row = document.createElement('tr');
        row.innerHTML = '<td colspan="5">No hay artículos registrados.</td>';
        tableBody.appendChild(row);
        return;
      }

      items.forEach((item) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.nombre}</td>
          <td>${item.categoria}</td>
          <td>${item.cantidad}</td>
          <td>$${Number(item.precio).toFixed(2)}</td>
          <td>${item.descripcion || 'Sin descripción'}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const nuevoArticulo = {
        nombre: document.getElementById('nombre').value.trim(),
        categoria: document.getElementById('categoria').value,
        cantidad: document.getElementById('cantidad').value,
        precio: document.getElementById('precio').value,
        descripcion: document.getElementById('descripcion').value.trim()
      };

      if (!nuevoArticulo.nombre || !nuevoArticulo.precio) return;

      const items = loadItems();
      items.push(nuevoArticulo);
      saveItems(items);
      renderItems(items);
      form.reset();
      document.getElementById('cantidad').value = '1';
    });

    renderItems(loadItems());
  </script>
</body>
</html>
